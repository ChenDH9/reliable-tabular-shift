
name: tests
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Export gitless release tree
        run: |
          mkdir -p "$RUNNER_TEMP/reliable-tabular-shift"
          git archive --format=tar HEAD | tar -xf - -C "$RUNNER_TEMP/reliable-tabular-shift"
      - run: python -m pip install --upgrade pip
      - run: pip install -r "$RUNNER_TEMP/reliable-tabular-shift/requirements-export.txt"
      - run: |
          cd "$RUNNER_TEMP/reliable-tabular-shift"
          PYTHONDONTWRITEBYTECODE=1 python -m pytest -q -m package -p no:cacheprovider
      - run: |
          cd "$RUNNER_TEMP/reliable-tabular-shift"
          PYTHONDONTWRITEBYTECODE=1 python scripts/verify_release.py --root . --profile package
