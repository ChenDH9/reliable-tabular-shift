
name: tests
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-export.txt
      - run: PYTHONDONTWRITEBYTECODE=1 python -m pytest -q -m package -p no:cacheprovider
      - run: PYTHONDONTWRITEBYTECODE=1 python scripts/verify_release.py --root . --profile package
